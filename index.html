<!DOCTYPE html>
<html>
<head>
<title>The Lightworkers Oracle</title>

<style>

body{
font-family: Arial, sans-serif;
text-align:center;
padding:40px;
background:linear-gradient(180deg,#f5efe6,#e8dfd4,#d9cfc3);
color:#3a342f;
}

h1{
margin-bottom:10px;
}

/* CARD GRID */

.deck{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
margin-top:60px;
}

/* CARD */

.card{
width:160px;
height:240px;
perspective:1000px;
cursor:pointer;
}

.inner{
position:relative;
width:100%;
height:100%;
transform-style:preserve-3d;
transition:transform 0.7s;
}

.flipped{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:12px;
background-size:cover;
background-position:center;
box-shadow:0 6px 20px rgba(0,0,0,0.25);
}

.front{
transform:rotateY(180deg);
}

#reading{
margin-top:60px;
max-width:900px;
margin-left:auto;
margin-right:auto;
text-align:left;
line-height:1.8;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.section{
margin-top:15px;
}

.section-title{
font-weight:bold;
margin-bottom:5px;
}

</style>
</head>

<body>

<h1>🔮 The Lightworkers Oracle</h1>
<p>Take a deep breath and choose the card you feel drawn to.</p>

<div class="deck" id="deck"></div>

<div id="reading"></div>

<script>

const backImage="images/back.png"

const cards=[

{
image:"images/rites-of-passage.png",
title:"Rites of Passage",
affirmation:"I move through life as though I am being initiated",
message:`Rites of Passage is the card that comes forward when you find yourself moving through a portal...`,
activation:"Ho raa shee ne yti u sha"
},

{
image:"images/multidimensionality.png",
title:"Multidimensionality",
affirmation:"I choose to anchor my light from different directions into the heart of Gaia",
message:`A multidimensional being is holding the energies of being a master of the multiverse...`,
activation:"Ey ra ee se ho na hee se"
},

{
image:"images/spirit-allies.png",
title:"Spirit Allies",
affirmation:"I allow the tools I use to guide me ahead on this journey",
message:`If you are drawn to metaphysical tools and esoteric wisdom...`,
activation:"hurr ha rey so ne hurr sho ya kay"
},

{
image:"images/pleasure-path.png",
title:"Pleasure Path",
affirmation:"I allow myself to open up and receive pleasure",
message:`The Pleasure Path is deeply connected to Divine Feminine energies...`,
activation:"Aa se niiii reyyy ho to ke ma"
},

{
image:"images/frequency-keeper.png",
title:"Frequency Keeper",
affirmation:"I am a portal for transmuting frequencies",
message:`The Frequency Keeper carries the codes for altering frequencies...`,
activation:"Aa lah re sheee no ya ke ri yah"
},

{
image:"images/sangha.png",
title:"Sangha",
affirmation:"I am calling forward my Sangha who are here to walk this path with me",
message:`Sangha refers to soul family or community...`,
activation:"Sho ray hay sto ni ko yi pa yaaal"
},

{
image:"images/deep-sleep.png",
title:"Deep Sleep",
affirmation:"I embrace this season of rest",
message:`Life happens in cycles...`,
activation:"She she ni ye ki she ri hey"
},

{
image:"images/orange-flame.png",
title:"Orange Flame",
affirmation:"I rise out of the ashes that once buried me",
message:`Orange Flame is the energy that is used for cleansing...`,
activation:"Shay ya ho ne do ya he ka ji ho"
},

{
image:"images/the-artist.png",
title:"The Artist",
affirmation:"I am a creative intuitive who is here to spread their art into the world",
message:`The Artist just is...`,
activation:"Ho hum ke ya tu re um te syha"
},

{
image:"images/system-disruptor.png",
title:"The System Disruptor",
affirmation:"I am here to create my own path",
message:`The Divergent stands out...`,
activation:"Ul shi ke ri hu ya ja ni hi kaaash"
}

]

function shuffle(array){
for(let i=array.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1))
[array[i],array[j]]=[array[j],array[i]]
}
return array
}

const deck=document.getElementById("deck")
const shuffled=shuffle([...cards])

shuffled.forEach((card)=>{

const cardDiv=document.createElement("div")
cardDiv.className="card"

cardDiv.innerHTML=`
<div class="inner">
<div class="front" style="background-image:url('${card.image}')"></div>
<div class="back" style="background-image:url('${backImage}')"></div>
</div>
`

cardDiv.onclick=function(){

document.querySelectorAll(".inner").forEach(c=>c.classList.remove("flipped"))
cardDiv.querySelector(".inner").classList.add("flipped")

document.getElementById("reading").innerHTML=`
<h2>${card.title}</h2>

<div class="section">
<div class="section-title">Affirmation</div>
${card.affirmation}
</div>

<div class="section">
<div class="section-title">Message</div>
${card.message}
</div>

<div class="section">
<div class="section-title">Activation</div>
${card.activation}
</div>
`
}

deck.appendChild(cardDiv)

})

</script>

</body>
</html>
